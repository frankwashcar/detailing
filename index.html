<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法蘭克精緻汽車美容 | 職人級車漆護理</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-bg: #FDFBFB; --secondary-bg: #F4F1EA; --accent-gold: #C4A77D; --text-dark: #4A4A4A; --text-brown: #5D4037; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; background-color: var(--primary-bg); color: var(--text-dark); line-height: 1.6; scroll-behavior: smooth; }
        header { text-align: center; padding: 50px 15px; background: linear-gradient(rgba(253,251,251,0.96), rgba(253,251,251,0.96)), url('https://images.unsplash.com/photo-1552933529-e359b2477262?auto=format&fit=crop&w=1350&q=80'); background-size: cover; background-position: center; border-bottom: 1px solid #f0f0f0; }
        .badge { display: inline-block; background: var(--text-brown); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; }
        h1 { font-size: 1.8rem; color: var(--text-brown); margin: 5px 0; letter-spacing: 2px; font-weight: 800; white-space: nowrap; }
        .main-slogan { font-size: 1.1rem; color: var(--accent-gold); font-weight: 600; margin: 18px 0 25px; letter-spacing: 1.5px; line-height: 1.7; padding: 0 10px; display: block; text-align: center; }
        
        /* 經營特色區塊 */
        .intro-features { padding: 40px 20px; max-width: 800px; margin: 0 auto; background: #fff; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #f0f0f0; margin-top: -30px; position: relative; z-index: 10; text-align: center; }
        .intro-features h2 { color: var(--text-brown); font-size: 1.3rem; margin-bottom: 20px; }
        .feature-line { margin-bottom: 12px; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; color: var(--text-dark); }
        .feature-line i { color: var(--accent-gold); margin-right: 10px; font-size: 1.1rem; }
        
        .location-box { background: var(--secondary-bg); padding: 15px; border-radius: 12px; margin-top: 25px; font-size: 0.9rem; color: var(--text-brown); font-weight: 600; letter-spacing: 1px; }

        .nav-btn { background: var(--accent-gold); color: white; padding: 13px 0; width: 210px; border-radius: 50px; text-decoration: none; font-weight: bold; display: block; margin: 25px auto; transition: 0.3s; font-size: 0.95rem; }
        .section-title { text-align: center; color: var(--text-brown); margin: 60px 0 30px; font-size: 1.5rem; position: relative; padding-bottom: 12px; font-weight: 700; letter-spacing: 1px; }
        .section-title::after { content: ''; width: 35px; height: 3px; background: var(--accent-gold); position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); border-radius: 2px; }

        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 1100px; margin: 0 auto; padding: 0 15px; }
        .gallery-item { position: relative; overflow: hidden; border-radius: 10px; height: 160px; cursor: pointer; background: #eee; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .services { padding: 0 15px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr; gap: 20px; }
        .service-card { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f5f5f5; }
        .service-card h3 { color: var(--accent-gold); margin-top: 0; font-size: 1.35rem; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
        .service-list { list-style: none; padding: 0; text-align: left; font-size: 0.92rem; margin: 0 auto; width: 100%; }
        .service-list li { margin-bottom: 8px; display: block; line-height: 1.5; }
        .service-list li::before { content: '✓'; color: var(--accent-gold); margin-right: 10px; font-weight: 900; }
        
        .price-tag { background: #fdfaf4; padding: 12px; border-radius: 10px; margin-top: 15px; border: 1px solid #eee; }
